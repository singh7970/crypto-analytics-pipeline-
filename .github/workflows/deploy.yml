name: Deploy to AWS Lambda

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Package and Publish Lambda Layer
        id: layer
        run: |
          # Build the layer directory structure
          mkdir -p build_layer/python
          pip install -r layer_requirements.txt -t build_layer/python/
          
          # Zip the layer
          cd build_layer
          zip -r ../crypto-layer.zip python/
          cd ..
          
          # Publish layer to AWS and export the new ARN to environment variables
          LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name CryptoAnalyticsLayer \
            --description "Shared Dependencies for Crypto Analytics Pipeline" \
            --zip-file fileb://crypto-layer.zip \
            --compatible-runtimes python3.12 \
            --query 'LayerVersionArn' \
            --output text)
            
          echo "We successfully published layer: $LAYER_ARN"
          echo "LAYER_ARN=$LAYER_ARN" >> $GITHUB_ENV

      - name: Package and Deploy Ingestion Lambda
        run: |
          # Zip only the handler
          cd lambda_handler
          zip -r ../ingestion.zip handler.py
          cd ..
          
          # Upload the code
          aws lambda update-function-code \
            --function-name CryptoIngestionLambda \
            --zip-file fileb://ingestion.zip
            
          # Wait for AWS to finish updating the code before changing the layer
          aws lambda wait function-updated --function-name CryptoIngestionLambda
            
          # Attach the newly published layer
          aws lambda update-function-configuration \
            --function-name CryptoIngestionLambda \
            --layers ${{ env.LAYER_ARN }}

      - name: Package and Deploy Transform Lambda
        run: |
          # Zip only the handler
          cd transform_lambda
          zip -r ../transform.zip handler.py
          cd ..
          
          # Upload the code
          aws lambda update-function-code \
            --function-name CryptoTransformLambda \
            --zip-file fileb://transform.zip
            
          # Wait for AWS to finish updating the code before changing the layer
          aws lambda wait function-updated --function-name CryptoTransformLambda
            
          # Attach the newly published layer
          aws lambda update-function-configuration \
            --function-name CryptoTransformLambda \
            --layers ${{ env.LAYER_ARN }}
